    <style>
      .chart-page {
        max-width: none;
        margin: 0 auto;
        padding: 0.75rem 1rem 1rem;
        box-sizing: border-box;
        min-height: 100vh;
      }
      .chart-page h1 {
        font-size: 1.2rem;
        margin-bottom: 0.35rem;
      }
      .chart-page .note {
        color: #555;
        font-size: 0.82rem;
        margin-bottom: 0.6rem;
      }
      .episode-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1rem;
        margin-bottom: 0.75rem;
        padding: 0.65rem 0.85rem;
        background: #f5f7fa;
        border: 1px solid #e0e6ed;
        border-radius: 8px;
      }
      .episode-toolbar button {
        font-size: 1.35rem;
        line-height: 1;
        min-width: 2.75rem;
        padding: 0.35rem 0.6rem;
        cursor: pointer;
        border: 1px solid #b0bec5;
        border-radius: 6px;
        background: #fff;
      }
      .episode-toolbar button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .episode-toolbar .episode-slider-wrap {
        flex: 1 1 240px;
        min-width: 180px;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .episode-toolbar label {
        font-size: 0.88rem;
        color: #333;
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem 0.75rem;
        align-items: baseline;
      }
      .episode-toolbar #epRange {
        color: #666;
        font-size: 0.82rem;
      }
      .episode-toolbar input[type="range"] {
        width: 100%;
        cursor: pointer;
      }
      .canonical-plot-heading {
        padding: 0.85rem 1rem;
        margin-bottom: 0.5rem;
        max-width: 100%;
        background: #ffffff;
        color: #0f172a;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .canonical-plot-heading-line {
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.42;
        color: #0f172a;
        word-break: break-word;
      }
      .canonical-plot-heading-meta {
        font-size: 0.86rem;
        font-weight: 700;
        color: #1d4ed8;
        margin-top: 0.25rem;
      }
      .canonical-plot-period {
        margin-top: 0.4rem;
        font-size: 0.88rem;
        font-weight: 600;
        color: #334155;
        word-break: break-word;
      }
      .canonical-plot-explain {
        margin: 0.5rem 0 0;
        font-size: 0.84rem;
        line-height: 1.52;
        color: #1e293b;
        padding: 0.55rem 0.65rem;
        background: #f1f5f9;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        max-width: 100%;
      }
      #chart {
        width: 100%;
        min-height: 360px;
      }
      #chartError {
        color: #a22;
        white-space: pre-wrap;
      }
      .nav-back {
        margin-bottom: 0.6rem;
      }
      .nav-back a {
        color: #1565c0;
      }
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #d8dee8;
        --text: #111827;
        --muted: #667085;
        --gspc: #2563eb;
        --uvix: #16a34a;
        --rsi: #f97316;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      .chart-page {
        padding: 20px 24px 24px;
      }
      .nav-back,
      .note,
      .canonical-plot-heading-line,
      .canonical-plot-explain {
        display: none;
      }
      .workspace-header {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 16px;
        align-items: end;
        margin: 0 0 14px;
      }
      .eyebrow {
        margin: 0 0 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .chart-page h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .context-copy {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
      .legend-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }
      .legend-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: #344054;
        font-size: 12px;
        font-weight: 650;
      }
      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
      }
      .legend-dot.gspc {
        background: var(--gspc);
      }
      .legend-dot.uvix {
        background: var(--uvix);
      }
      .legend-dot.rsi {
        background: var(--rsi);
      }
      .episode-toolbar {
        display: grid;
        grid-template-columns: 44px minmax(220px, 1fr) 44px;
        gap: 10px;
        align-items: center;
        margin: 0 0 12px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }
      .episode-toolbar button {
        width: 44px;
        height: 38px;
        min-width: 44px;
        padding: 0;
        border-radius: 7px;
        border: 1px solid #b9c2d0;
        background: #fff;
        color: #1f2937;
        font-size: 18px;
        font-weight: 800;
      }
      .episode-toolbar button:not(:disabled):hover {
        background: #f3f5f8;
        border-color: #98a2b3;
      }
      .episode-toolbar .episode-slider-wrap {
        min-width: 0;
      }
      .episode-toolbar label {
        justify-content: space-between;
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }
      .episode-toolbar #epRange {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .episode-toolbar input[type="range"] {
        accent-color: #344054;
      }
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(120px, 1fr));
        gap: 8px;
        margin: 0 0 12px;
      }
      .metric {
        min-height: 66px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }
      .metric strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
        line-height: 1.1;
        letter-spacing: 0;
      }
      .metric .positive {
        color: #047857;
      }
      .metric .negative {
        color: #b42318;
      }
      .canonical-plot-heading {
        margin: 0 0 8px;
        padding: 0;
        border: 0;
        box-shadow: none;
        background: transparent;
      }
      .canonical-plot-period {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }
      #chart {
        overflow: hidden;
        min-height: 520px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      #chartError {
        margin-bottom: 10px;
        color: #b42318;
        font-size: 13px;
      }
      @media (max-width: 980px) {
        .workspace-header {
          grid-template-columns: 1fr;
          align-items: start;
        }
        .legend-strip {
          justify-content: flex-start;
        }
        .metric-grid {
          grid-template-columns: repeat(3, minmax(120px, 1fr));
        }
      }
      @media (max-width: 640px) {
        .chart-page {
          padding: 14px;
        }
        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .episode-toolbar {
          grid-template-columns: 40px minmax(0, 1fr) 40px;
        }
        .context-copy {
          font-size: 12px;
        }
      }
    </style>

  <body>
    <main class="chart-page">
      <header class="workspace-header">
        <div>
          <p class="eyebrow">Canonical UVIX Episodes</p>
          <h1>GSPC・UVIX・RSI エピソードビュー</h1>
          <p class="context-copy">
            UVIXエントリーごとに切り出し、GSPC close と UVIX close はエントリー時点を 1.000 として相対化。RSI14 は実値で表示。
          </p>
        </div>
        <div class="legend-strip" aria-label="系列">
          <span class="legend-pill"><i class="legend-dot gspc"></i>GSPC close / entry</span>
          <span class="legend-pill"><i class="legend-dot uvix"></i>UVIX close / entry</span>
          <span class="legend-pill"><i class="legend-dot rsi"></i>RSI14</span>
        </div>
      </header>
      <div id="episodeToolbar" class="episode-toolbar" hidden>
        <button type="button" id="epPrev" aria-label="前のエピソード">←</button>
        <div class="episode-slider-wrap">
          <label for="epSlider">
            <span id="epLabel">エピソード</span>
            <span id="epRange"></span>
          </label>
          <input type="range" id="epSlider" min="0" max="0" value="0" />
        </div>
        <button type="button" id="epNext" aria-label="次のエピソード">→</button>
      </div>
      <section class="metric-grid" aria-label="エピソード指標">
        <div class="metric"><span>期間</span><strong id="metricDays">-</strong></div>
        <div class="metric"><span>Entry RSI</span><strong id="metricEntryRsi">-</strong></div>
        <div class="metric"><span>Exit RSI</span><strong id="metricExitRsi">-</strong></div>
        <div class="metric"><span>GSPC return</span><strong id="metricGspcReturn">-</strong></div>
        <div class="metric"><span>UVIX return</span><strong id="metricUvixReturn">-</strong></div>
        <div class="metric"><span>Episode</span><strong id="metricEpisode">-</strong></div>
      </section>
      <div id="chartError"></div>
      <div id="canonicalPlotHeading" class="canonical-plot-heading" hidden aria-live="polite">
        <div id="canonicalPlotHeadingLines"></div>
        <div class="canonical-plot-period" id="canonicalPlotPeriod"></div>
        <p class="canonical-plot-explain" id="canonicalPlotExplain" hidden></p>
      </div>
      <div id="chart"></div>
    </main>
